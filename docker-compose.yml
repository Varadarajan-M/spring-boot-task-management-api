services:
  postgres:
    image: postgres:17
    container_name: taskmanager-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass # Pushing this to git as this is only a learning repo.
      # You can trust me with production xD
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
